<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Schulchat-RLP | Zentrales Login</title>
    <meta name="description" content="Offizielles Kommunikationsportal für Schulen in Rheinland-Pfalz.">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="viewport">
        <main class="auth-layout">
            <div class="portal-card">
                <div class="card-glow"></div>
                
                <header class="portal-header">
                    <div class="logo-wrapper">
                        <img src="logo-2x.png" alt="Schulchat-RLP Logo" class="portal-logo">
                    </div>
                    <div class="status-indicator">
                        <span class="dot"></span> System bereit
                    </div>
                </header>

                <section class="portal-content">
                    <div class="text-group">
                        <h1>Schulchat-RLP</h1>
                        <p>Das offizielle Kommunikationsportal des Landes Rheinland-Pfalz. Bitte melden Sie sich mit Ihrem Bildungslogin an.</p>
                    </div>

                    <div class="action-area">
                        <a href="https://bildungslogin-rlp.de" class="btn-primary">
                            <span class="btn-text">Mit Bildungslogin anmelden</span>
                            <div class="btn-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                            </div>
                        </a>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
