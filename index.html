<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Schulchat-RLP | Offizielles Portal</title>
    <meta name="description" content="Sicherer Schulchat für Rheinland-Pfalz">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <div class="glass-card">
            <header>
                <img src="logo-2x.png" alt="Logo" class="main-logo">
                <div class="badge">Offizielles Portal</div>
            </header>
            
            <section class="hero-text">
                <h1>Schulchat-RLP</h1>
                <p>Der sichere Kommunikationsraum für Schulen in Rheinland-Pfalz. Melden Sie sich an, um zu starten.</p>
            </section>

            <div class="action-area">
                <a href="https://bildungslogin-rlp.de" class="btn-primary">
                    <span class="btn-text">Mit Bildungslogin anmelden</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
