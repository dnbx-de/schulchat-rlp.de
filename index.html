<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schulchat-RLP | Offizielles Portal</title>
    <meta name="description" content="Sicherer Messenger-Dienst für Schulen in Rheinland-Pfalz.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <main>
        <div class="container">
            <header>
                <img src="logo-2x.png" alt="Schulchat-RLP Logo" class="logo">
                <div class="badge">Landeslösung RLP</div>
            </header>
            
            <section class="content">
                <h1>Schulchat-RLP</h1>
                <p class="subtitle">Sichere Kommunikation für Bildungseinrichtungen</p>
                
                <div class="info-box">
                    <p>Melden Sie sich mit Ihrem zentralen <strong>Bildungslogin</strong> an, um auf Ihre Chats und Gruppen zuzugreifen.</p>
                </div>

                <a href="https://bildungslogin-rlp.de" class="login-link">
                    <span>Mit Bildungslogin anmelden</span>
                </a>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
