<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Schulchat-RLP | Offizielles Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    
    <main>
        <div class="glass-card">
            <div class="badge">Sicher • Offiziell • RLP</div>
            <img src="logo-2x.png" alt="Logo" class="logo">
            
            <header>
                <h1>Schulchat-RLP</h1>
                <p class="subtitle">Die moderne Kommunikationsplattform für Schulen in Rheinland-Pfalz.</p>
            </header>

            <div class="action-area">
                <a href="https://bildungslogin-rlp.de" class="btn-primary">
                    <span>Mit Bildungslogin anmelden</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
